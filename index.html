<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Daykit</title>
<meta name="description" content="A drop-in day-of-event mini app: schedule, live map, and offline pocket guide." />

<!-- PWA -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#f28c1a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Daykit" />
<link rel="apple-touch-icon" href="assets/icon-192.png" />

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>

<style>
  :root {
    --primary: #f28c1a;
    --accent: #e4562b;
    --sun: #f2b21a;
    --water: #1d9bd1;
    --ink: #2a1a00;
    --bg: #fff7ea;
    --card: #ffffff;
    --muted: #7a6a52;
    --line: #f0e2cb;
    --good: #2e9e5b;
    --pastdim: 0.5;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    line-height: 1.4;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); }

  /* Header */
  header.app {
    position: sticky; top: 0; z-index: 500;
    padding: calc(var(--safe-top) + 12px) 16px 12px;
    background: linear-gradient(135deg, var(--sun), var(--primary) 55%, var(--accent));
    color: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,.18);
  }
  header.app .eyebrow { font-size: 12px; text-transform: uppercase; letter-spacing: .09em; opacity: .92; font-weight: 700; }
  header.app h1 { margin: 2px 0 4px; font-size: 21px; line-height: 1.1; }
  header.app .meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; font-size: 13px; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,.22); border: 1px solid rgba(255,255,255,.35);
    padding: 2px 9px; border-radius: 999px; font-weight: 700; font-size: 12px;
  }

  /* Tabs */
  nav.tabs {
    position: sticky; top: 0; z-index: 480;
    display: grid; grid-template-columns: repeat(3, 1fr);
    background: var(--card); border-bottom: 1px solid var(--line);
  }
  nav.tabs button {
    appearance: none; border: 0; background: none; cursor: pointer;
    padding: 11px 4px 9px; font-size: 13px; font-weight: 700; color: var(--muted);
    border-bottom: 3px solid transparent; font-family: inherit;
  }
  nav.tabs button .ic { display: block; font-size: 18px; line-height: 1; margin-bottom: 3px; }
  nav.tabs button[aria-selected="true"] { color: var(--accent); border-bottom-color: var(--accent); }

  main { padding: 14px 16px calc(28px + var(--safe-bottom)); max-width: 720px; margin: 0 auto; }
  section.tab { display: none; }
  section.tab.active { display: block; animation: fade .18s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 14px; margin: 0 0 12px; box-shadow: 0 1px 3px rgba(0,0,0,.04);
  }
  .card h2 { margin: 0 0 8px; font-size: 15px; }
  .muted { color: var(--muted); }
  .small { font-size: 13px; }

  /* Now banner */
  .now {
    background: linear-gradient(135deg, #fff, #fff6e6);
    border: 2px solid var(--primary);
  }
  .now .label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; font-weight: 800; color: var(--accent); }
  .now .title { font-size: 22px; font-weight: 800; margin: 2px 0; }
  .now .when { font-size: 14px; color: var(--muted); font-weight: 600; }
  .now .next { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line); font-size: 14px; }
  .now .next b { color: var(--ink); }
  .countdown { font-variant-numeric: tabular-nums; font-weight: 800; color: var(--accent); }
  .now .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .now .actions .btn { padding: 10px 13px; font-size: 14px; }

  /* Schedule list */
  ol.sched { list-style: none; margin: 0; padding: 0; }
  ol.sched li {
    display: grid; grid-template-columns: 62px 1fr auto; gap: 10px; align-items: center;
    padding: 11px 6px; border-bottom: 1px solid var(--line);
  }
  ol.sched li:last-child { border-bottom: 0; }
  ol.sched .time { font-size: 12px; font-weight: 700; color: var(--muted); font-variant-numeric: tabular-nums; }
  ol.sched .what { font-weight: 700; font-size: 15px; }
  ol.sched .what .sub { display: block; font-weight: 500; font-size: 12px; color: var(--muted); }
  ol.sched .go {
    appearance: none; border: 1px solid var(--line); background: #fff; border-radius: 9px;
    width: 34px; height: 34px; font-size: 15px; cursor: pointer; color: var(--accent);
  }
  ol.sched li.is-now { background: #fff6e6; border-radius: 10px; box-shadow: inset 0 0 0 2px var(--primary); }
  ol.sched li.is-now .what::after { content: " • NOW"; color: var(--accent); font-size: 11px; font-weight: 800; }
  ol.sched li.is-past { opacity: var(--pastdim); }
  ol.sched li.is-past .what { text-decoration: line-through; text-decoration-color: var(--line); }
  .sesspill { display:inline-block; min-width: 18px; text-align:center; background: var(--accent); color:#fff; font-size:10px; font-weight:800; border-radius:6px; padding:1px 5px; margin-right:5px; }

  /* Map */
  #map { height: 62vh; min-height: 340px; border-radius: 14px; border: 1px solid var(--line); }
  .maprow { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .btn {
    appearance: none; border: 0; border-radius: 10px; padding: 11px 14px; font-weight: 700;
    font-size: 14px; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.ghost { background: #fff; color: var(--ink); border: 1px solid var(--line); }
  .btn:active { transform: translateY(1px); }
  .locstat { font-size: 13px; margin-top: 8px; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; font-size: 12px; margin-top: 10px; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,.15); }

  .pin {
    display:flex; align-items:center; justify-content:center;
    width: 30px; height: 30px; border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg); border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,.35);
    font-size: 15px;
  }
  .pin > span { transform: rotate(45deg); }
  .pin.me { border-radius: 50%; background: var(--water); }

  /* Info */
  ul.plain { margin: 6px 0 0; padding-left: 18px; }
  ul.plain li { margin: 4px 0; }
  .check { list-style: none; margin: 0; padding: 0; }
  .check li { display: flex; gap: 10px; align-items: flex-start; padding: 9px 2px; border-bottom: 1px solid var(--line); }
  .check li:last-child { border-bottom: 0; }
  .check input { width: 20px; height: 20px; margin-top: 1px; accent-color: var(--accent); flex: 0 0 auto; }
  .check label { font-size: 14px; }
  .check li.done label { text-decoration: line-through; color: var(--muted); }
  .kv { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; font-size: 14px; margin: 0; }
  .kv dt { color: var(--muted); }
  .kv dd { margin: 0; font-weight: 600; }

  .installbar {
    position: fixed; left: 12px; right: 12px; bottom: calc(12px + var(--safe-bottom)); z-index: 700;
    background: var(--ink); color: #fff; border-radius: 12px; padding: 12px 14px;
    display: none; align-items: center; gap: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.3);
    max-width: 700px; margin: 0 auto;
  }
  .installbar.show { display: flex; }
  .installbar p { margin: 0; font-size: 13px; flex: 1; }
  .installbar .btn { padding: 8px 12px; }
  .installbar .x { background: none; border: 0; color: #fff; font-size: 20px; cursor: pointer; opacity: .8; }

  .loading { text-align: center; padding: 40px 0; color: var(--muted); }
  footer { text-align: center; font-size: 11px; color: var(--muted); padding: 8px 0 4px; }
  code { background: #f3ead6; padding: 1px 4px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>

<header class="app">
  <div class="eyebrow" id="hdrEyebrow">Daykit</div>
  <h1 id="hdrTitle">Loading your day...</h1>
  <div class="meta" id="hdrMeta"></div>
</header>

<nav class="tabs" role="tablist">
  <button role="tab" aria-selected="true" data-tab="schedule"><span class="ic">🗓️</span>Schedule</button>
  <button role="tab" aria-selected="false" data-tab="map"><span class="ic">🗺️</span>Map</button>
  <button role="tab" aria-selected="false" data-tab="info"><span class="ic">ℹ️</span>Info</button>
</nav>

<main>
  <section class="tab active" id="tab-schedule">
    <div id="nowWrap"></div>
    <div class="card">
      <h2>Full schedule</h2>
      <ol class="sched" id="schedList"><li class="loading">Loading schedule...</li></ol>
    </div>
  </section>

  <section class="tab" id="tab-map">
    <div class="maprow">
      <button class="btn primary" id="findMe">📍 Find me</button>
      <button class="btn ghost" id="recenter">Recenter</button>
    </div>
    <div id="map"></div>
    <div class="locstat muted" id="locStat">Tap "Find me" to drop your live location.</div>
    <div class="legend" id="legend"></div>
  </section>

  <section class="tab" id="tab-info">
    <div id="infoWrap" class="loading">Loading...</div>
  </section>
</main>

<div class="installbar" id="installBar">
  <p><b>Install this day</b> to your home screen. Runs offline all day.</p>
  <button class="btn primary" id="installBtn">Install</button>
  <button class="x" id="installX" aria-label="Dismiss">&times;</button>
</div>

<footer id="foot"></footer>

<script>
/* ---------- Daykit: a generic day-of-event PWA driven entirely by event.json ---------- */
var EV = null;                 // the loaded event
var placeById = {};            // id -> place
var map = null, meMarker = null, markers = {}, watchId = null;
var tickTimer = null;
var myPos = null;              // last known GPS fix, once "Find me" is on

function walkUrl(p){
  return "https://www.google.com/maps/dir/?api=1&destination="+p.lat+","+p.lng+"&travelmode=walking";
}

var ICONS = {
  flag:"🚩", compass:"🧭", water:"💦", truck:"🚚",
  target:"🎯", rocket:"🚀", aid:"⛑️", rest:"🚻",
  lunch:"🥪", parking:"🅿️", pin:"📍"
};
var KIND_COLOR = { hub:"#6d4bd6", activity:"#e4562b", water:"#1d9bd1", service:"#2e9e5b" };
var KIND_LABEL = { hub:"Hub", activity:"Activity", water:"Water", service:"Services" };

/* ---- time helpers. All schedule times are local wall-clock on event.date. ---- */
function hm(t){ var p=t.split(":"); return {h:+p[0], m:+p[1]}; }
function eventDateAt(t){
  var d = EV.date.split("-");            // yyyy-mm-dd
  var x = hm(t);
  return new Date(+d[0], +d[1]-1, +d[2], x.h, x.m, 0, 0);  // local time
}
function fmt12(t){
  var x=hm(t), ap = x.h>=12?"pm":"am", h=x.h%12; if(h===0)h=12;
  return h + (x.m?(":"+String(x.m).padStart(2,"0")):"") + ap;
}
function fmtRange(a,b){ return fmt12(a)+" – "+fmt12(b); }
function isEventToday(){
  var n=new Date(), d=EV.date.split("-");
  return n.getFullYear()==+d[0] && (n.getMonth()+1)==+d[1] && n.getDate()==+d[2];
}
function statusOf(item, now){
  var s=eventDateAt(item.start).getTime(), e=eventDateAt(item.end).getTime(), t=now.getTime();
  if(t>=e) return "past";
  if(t>=s) return "now";
  return "future";
}
function fmtCountdown(ms){
  if(ms<0) ms=0;
  var s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor((s%3600)/60), ss=s%60;
  if(h>0) return h+"h "+m+"m";
  if(m>0) return m+"m "+String(ss).padStart(2,"0")+"s";
  return ss+"s";
}

/* ---------- rendering ---------- */
function renderHeader(){
  document.title = EV.title + (EV.team? " · "+EV.team.rank : "");
  document.getElementById("hdrEyebrow").textContent = EV.subtitle || "Daykit";
  document.getElementById("hdrTitle").textContent = EV.title;
  var meta = document.getElementById("hdrMeta");
  var dateStr = eventDateAt("12:00").toLocaleDateString(undefined,{weekday:"long", month:"long", day:"numeric"});
  meta.innerHTML = "";
  var d = document.createElement("span"); d.className="badge"; d.textContent="📅 "+dateStr; meta.appendChild(d);
  if(EV.team){ var t=document.createElement("span"); t.className="badge"; t.textContent="🐻 "+EV.team.rank+" · "+EV.team.name; meta.appendChild(t); }
  if(EV.location){ var l=document.createElement("span"); l.className="badge"; l.textContent="📍 "+EV.location.name; meta.appendChild(l); }
}

function placeSuffix(item){
  var p = item.place && placeById[item.place];
  return p ? " · "+p.name : "";
}

function renderNow(){
  var wrap = document.getElementById("nowWrap");
  if(!isEventToday()){
    wrap.innerHTML = '<div class="card now"><div class="label">Heads up</div>'+
      '<div class="title">Not today</div>'+
      '<div class="when">This day runs on '+eventDateAt("12:00").toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"})+
      '. The live "now" tracker turns on that morning.</div></div>';
    return;
  }
  var now = new Date();
  var cur=null, nxt=null;
  for(var i=0;i<EV.schedule.length;i++){
    var st=statusOf(EV.schedule[i], now);
    if(st==="now" && !cur){ cur=EV.schedule[i]; }
    if(st==="future" && !nxt){ nxt=EV.schedule[i]; }
  }
  var html='<div class="card now">';
  if(cur){
    html+='<div class="label">Right now</div>';
    html+='<div class="title">'+esc(cur.title)+'</div>';
    html+='<div class="when">'+fmtRange(cur.start,cur.end)+placeSuffix(cur)+'</div>';
    html+='<div class="next">Wraps up in <span class="countdown" data-until="'+eventDateAt(cur.end).getTime()+'"></span>';
    if(nxt) html+='. Next: <b>'+esc(nxt.title)+'</b> at '+fmt12(nxt.start);
    html+='.</div>';
  } else if(nxt){
    html+='<div class="label">Up next</div>';
    html+='<div class="title">'+esc(nxt.title)+'</div>';
    html+='<div class="when">'+fmtRange(nxt.start,nxt.end)+placeSuffix(nxt)+'</div>';
    html+='<div class="next">Starts in <span class="countdown" data-until="'+eventDateAt(nxt.start).getTime()+'"></span>.</div>';
  } else {
    var first=EV.schedule[0];
    if(now.getTime()<eventDateAt(first.start).getTime()){
      html+='<div class="label">Good morning</div><div class="title">'+esc(first.title)+' at '+fmt12(first.start)+'</div>'+
            '<div class="when">Starts in <span class="countdown" data-until="'+eventDateAt(first.start).getTime()+'"></span>.</div>';
    } else {
      html+='<div class="label">That’s a wrap</div><div class="title">Day complete 🎉</div>'+
            '<div class="when">Turn in your name tag for your patch and medal.</div>';
    }
  }

  // Walk-to-next: prefer the next block's place, else the current block's place.
  var tp=null, tlabel="";
  if(nxt && nxt.place && placeById[nxt.place]){ tp=placeById[nxt.place]; tlabel="Walk to next: "+tp.name; }
  else if(cur && cur.place && placeById[cur.place]){ tp=placeById[cur.place]; tlabel="Walk to "+tp.name; }
  if(tp){
    var dist = myPos ? " ("+fmtDist(haversine(myPos.lat,myPos.lng,tp.lat,tp.lng))+")" : "";
    html+='<div class="actions">'+
      '<a class="btn primary" style="text-decoration:none" href="'+walkUrl(tp)+'" target="_blank" rel="noopener">🚶 '+esc(tlabel)+dist+'</a>'+
      '<button class="btn ghost" data-goplace="'+tp.id+'">Show on map</button>'+
    '</div>';
  }

  html+='</div>';
  wrap.innerHTML=html;
  var gp = wrap.querySelector("[data-goplace]");
  if(gp) gp.addEventListener("click", function(){ focusPlace(gp.getAttribute("data-goplace")); });
  tick();
}

function renderSchedule(){
  var now = new Date(), today = isEventToday();
  var ol = document.getElementById("schedList");
  ol.innerHTML="";
  EV.schedule.forEach(function(item){
    var li=document.createElement("li");
    var st = today ? statusOf(item, now) : "";
    if(st==="now") li.className="is-now";
    else if(st==="past") li.className="is-past";
    var sess = item.session? '<span class="sesspill">'+item.session+'</span>' : (item.all?'<span class="sesspill" style="background:#6d4bd6">ALL</span>':'');
    var sub = "";
    var p = item.place && placeById[item.place];
    if(p) sub = p.name;
    if(item.also && placeById[item.also]) sub += (sub?" + ":"")+placeById[item.also].name;
    li.innerHTML =
      '<span class="time">'+fmt12(item.start)+'<br>'+fmt12(item.end)+'</span>'+
      '<span class="what">'+sess+esc(item.title)+(sub?'<span class="sub">'+esc(sub)+'</span>':'')+'</span>'+
      (p?'<button class="go" title="Show on map" data-place="'+p.id+'">🗺️</button>':'<span></span>');
    ol.appendChild(li);
  });
  ol.querySelectorAll(".go").forEach(function(b){
    b.addEventListener("click", function(){ focusPlace(b.getAttribute("data-place")); });
  });
}

function renderInfo(){
  var w=document.getElementById("infoWrap");
  w.className="";
  var loc=EV.location;
  var mapsUrl = "https://www.google.com/maps/search/?api=1&query="+loc.lat+","+loc.lng;
  var html="";

  html+='<div class="card"><h2>'+esc(EV.title)+'</h2>';
  if(EV.subtitle) html+='<p class="muted small" style="margin:0 0 8px">'+esc(EV.subtitle)+'</p>';
  html+='<dl class="kv">';
  html+='<dt>Date</dt><dd>'+eventDateAt("12:00").toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric",year:"numeric"})+'</dd>';
  if(EV.team) html+='<dt>Team</dt><dd>'+esc(EV.team.rank)+' · '+esc(EV.team.name)+'</dd>';
  html+='<dt>Where</dt><dd>'+esc(loc.name)+'</dd>';
  if(loc.address) html+='<dt>Address</dt><dd>'+esc(loc.address)+'</dd>';
  html+='</dl>';
  html+='<div style="margin-top:10px"><a class="btn primary" style="text-decoration:none" href="'+mapsUrl+'" target="_blank" rel="noopener">Open in Maps</a></div>';
  if(EV.team && EV.team.note) html+='<p class="small muted" style="margin:10px 0 0">'+esc(EV.team.note)+'</p>';
  html+='</div>';

  if(EV.bring && EV.bring.length){
    html+='<div class="card"><h2>Bring / checklist</h2><ul class="check" id="bringList">';
    EV.bring.forEach(function(b,i){
      html+='<li><input type="checkbox" id="bring'+i+'"><label for="bring'+i+'">'+esc(b)+'</label></li>';
    });
    html+='</ul></div>';
  }

  if(EV.notes && EV.notes.length){
    html+='<div class="card"><h2>Good to know</h2><ul class="plain">';
    EV.notes.forEach(function(n){ html+='<li>'+esc(n)+'</li>'; });
    html+='</ul></div>';
  }

  html+='<div class="card"><h2>About this app</h2>'+
    '<p class="small muted" style="margin:0">This is a <b>Daykit</b>: a one-day pocket app built from photos of a paper schedule and map. '+
    'Install it to your home screen and it runs offline all day. To make one for a different day, swap in a new <code>event.json</code>.</p></div>';

  w.innerHTML=html;

  // checklist persistence
  var key="daykit:"+EV.id+":bring";
  var saved={};
  try { saved = JSON.parse(localStorage.getItem(key)||"{}"); } catch(e){}
  w.querySelectorAll("#bringList input").forEach(function(cb){
    if(saved[cb.id]){ cb.checked=true; cb.closest("li").classList.add("done"); }
    cb.addEventListener("change", function(){
      cb.closest("li").classList.toggle("done", cb.checked);
      saved[cb.id]=cb.checked;
      try { localStorage.setItem(key, JSON.stringify(saved)); } catch(e){}
    });
  });
}

/* ---------- map ---------- */
function mkPin(place){
  var color = KIND_COLOR[place.kind] || KIND_COLOR.activity;
  var glyph = ICONS[place.icon] || ICONS.pin;
  return L.divIcon({
    className:"", iconSize:[30,30], iconAnchor:[15,29], popupAnchor:[0,-28],
    html:'<div class="pin" style="background:'+color+'"><span>'+glyph+'</span></div>'
  });
}
function initMap(){
  if(map) return;
  if(typeof L === "undefined"){
    document.getElementById("map").innerHTML =
      '<div style="padding:24px;text-align:center;color:var(--muted);font-size:14px">'+
      'Map needs a connection the first time you open it. Reconnect once, then it works offline.</div>';
    document.getElementById("locStat").textContent = "Map library not loaded yet.";
    return;
  }
  var loc=EV.location;
  map = L.map("map", { zoomControl:true }).setView([loc.lat, loc.lng], loc.zoom||17);
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom:19, attribution:"&copy; OpenStreetMap"
  }).addTo(map);
  EV.places.forEach(function(p){
    var m=L.marker([p.lat,p.lng],{icon:mkPin(p)}).addTo(map);
    m.bindPopup("<b>"+esc(p.name)+"</b>"+(p.desc?"<br>"+esc(p.desc):"")+
      '<br><a href="'+walkUrl(p)+'" target="_blank" rel="noopener">🚶 Walk here</a>');
    markers[p.id]=m;
  });
  renderLegend();
}
function renderLegend(){
  var used={};
  EV.places.forEach(function(p){ used[p.kind]=true; });
  var el=document.getElementById("legend"); el.innerHTML="";
  Object.keys(used).forEach(function(k){
    var s=document.createElement("span");
    s.innerHTML='<span class="dot" style="background:'+(KIND_COLOR[k]||"#888")+'"></span>'+(KIND_LABEL[k]||k);
    el.appendChild(s);
  });
  var me=document.createElement("span");
  me.innerHTML='<span class="dot" style="background:var(--water)"></span>You';
  el.appendChild(me);
}
function focusPlace(id){
  showTab("map");
  setTimeout(function(){
    initMap(); if(!map) return; map.invalidateSize();
    var p=placeById[id]; if(!p) return;
    map.setView([p.lat,p.lng], Math.max(map.getZoom(),18), {animate:true});
    if(markers[id]) markers[id].openPopup();
  }, 60);
}
function startFindMe(){
  var stat=document.getElementById("locStat");
  if(!navigator.geolocation){ stat.textContent="This device has no GPS support."; return; }
  stat.textContent="Locating...";
  initMap();
  if(!map) return;
  if(watchId!==null) navigator.geolocation.clearWatch(watchId);
  watchId = navigator.geolocation.watchPosition(function(pos){
    var la=pos.coords.latitude, ln=pos.coords.longitude;
    myPos = { lat: la, lng: ln };
    renderNow();   // refresh the "walk to next" distance now that we have a fix
    if(!meMarker){
      meMarker = L.marker([la,ln], {icon:L.divIcon({className:"",iconSize:[22,22],iconAnchor:[11,11],
        html:'<div class="pin me"><span></span></div>'})}).addTo(map);
      map.setView([la,ln], 18);
    } else { meMarker.setLatLng([la,ln]); }
    var best=null,bd=1e12;
    EV.places.forEach(function(p){ var d=haversine(la,ln,p.lat,p.lng); if(d<bd){bd=d;best=p;} });
    stat.innerHTML = "You are here (±"+Math.round(pos.coords.accuracy)+"m)."+
      (best? " Nearest: <b>"+esc(best.name)+"</b>, "+fmtDist(bd)+" away." : "");
  }, function(err){
    stat.textContent = err.code===1 ? "Location permission denied. Enable it in your browser settings." : "Could not get a fix. Try again outside.";
  }, { enableHighAccuracy:true, maximumAge:5000, timeout:15000 });
}
function haversine(la1,ln1,la2,ln2){
  var R=6371000, toR=Math.PI/180;
  var dLa=(la2-la1)*toR, dLn=(ln2-ln1)*toR;
  var a=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1*toR)*Math.cos(la2*toR)*Math.sin(dLn/2)*Math.sin(dLn/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtDist(m){ return m<950 ? Math.round(m)+" m" : (m/1609.34).toFixed(1)+" mi"; }

/* ---------- tabs ---------- */
function showTab(name){
  document.querySelectorAll("nav.tabs button").forEach(function(b){
    b.setAttribute("aria-selected", b.getAttribute("data-tab")===name ? "true":"false");
  });
  document.querySelectorAll("section.tab").forEach(function(s){
    s.classList.toggle("active", s.id==="tab-"+name);
  });
  if(name==="map"){ initMap(); setTimeout(function(){ if(map) map.invalidateSize(); },60); }
  try { history.replaceState(null,"","#"+name); } catch(e){}
}

/* ---------- live ticking ---------- */
var lastRederive = 0;
function tick(){
  document.querySelectorAll(".countdown[data-until]").forEach(function(el){
    el.textContent = fmtCountdown(+el.getAttribute("data-until") - Date.now());
  });
}
function startClock(){
  if(tickTimer) clearInterval(tickTimer);
  tick();
  tickTimer = setInterval(function(){
    tick();
    if(Date.now() - lastRederive >= 20000){ lastRederive = Date.now(); renderNow(); renderSchedule(); }
  }, 1000);
}

function esc(s){ return String(s).replace(/[&<>"]/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]; }); }

/* ---------- boot ---------- */
function applyTheme(){
  if(!EV.theme) return;
  var r=document.documentElement.style, t=EV.theme;
  if(t.primary) r.setProperty("--primary", t.primary);
  if(t.accent)  r.setProperty("--accent", t.accent);
  if(t.sun)     r.setProperty("--sun", t.sun);
  if(t.water)   r.setProperty("--water", t.water);
  if(t.ink)     r.setProperty("--ink", t.ink);
  if(t.bg)      r.setProperty("--bg", t.bg);
  if(t.card)    r.setProperty("--card", t.card);
  if(t.water)   { KIND_COLOR.water = t.water; }
  if(t.accent)  { KIND_COLOR.activity = t.accent; }
  var tc=document.querySelector('meta[name="theme-color"]');
  if(tc && t.primary) tc.setAttribute("content", t.primary);
}
function boot(){
  fetch("event.json", {cache:"no-cache"}).then(function(r){ return r.json(); }).then(function(data){
    EV = data;
    EV.places = EV.places || [];
    EV.schedule = EV.schedule || [];
    placeById = {};
    EV.places.forEach(function(p){ placeById[p.id]=p; });
    applyTheme();
    renderHeader();
    renderNow();
    renderSchedule();
    renderInfo();
    document.getElementById("foot").textContent = "Daykit · map data © OpenStreetMap · offline-ready";
    startClock();
    var h=(location.hash||"").replace("#","");
    if(h==="map"||h==="info") showTab(h);
  }).catch(function(e){
    document.getElementById("hdrTitle").textContent="Could not load event.json";
    document.getElementById("schedList").innerHTML='<li class="loading">Add an <code>event.json</code> next to index.html.</li>';
    console.error(e);
  });
}

/* wire up */
document.querySelectorAll("nav.tabs button").forEach(function(b){
  b.addEventListener("click", function(){ showTab(b.getAttribute("data-tab")); });
});
document.getElementById("findMe").addEventListener("click", startFindMe);
document.getElementById("recenter").addEventListener("click", function(){
  initMap(); if(map) map.setView([EV.location.lat, EV.location.lng], EV.location.zoom||17);
});

/* PWA install */
var deferredPrompt=null;
window.addEventListener("beforeinstallprompt", function(e){
  e.preventDefault(); deferredPrompt=e;
  if(!localStorage.getItem("daykit:install-dismissed")) document.getElementById("installBar").classList.add("show");
});
document.getElementById("installBtn").addEventListener("click", function(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.finally(function(){
    deferredPrompt=null; document.getElementById("installBar").classList.remove("show");
  });
});
document.getElementById("installX").addEventListener("click", function(){
  document.getElementById("installBar").classList.remove("show");
  try { localStorage.setItem("daykit:install-dismissed","1"); } catch(e){}
});

/* service worker */
if("serviceWorker" in navigator){
  window.addEventListener("load", function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); });
}

boot();
</script>
