<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Are We There Yet?</title>
<meta name="description" content="A pocket app for a day or a whole trip. Pick a trip." />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#f28c1a" />
<link rel="apple-touch-icon" href="assets/icon-192.png" />
<style>
  :root{
    --bg:#fff7ea; --card:#ffffff; --ink:#2a1a00; --muted:#7a6a52; --line:#eadfce;
    --primary:#f28c1a; --accent:#e4562b;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#161310; --card:#211c17; --ink:#f3ece0; --muted:#a99e8c; --line:#33291f; }
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  .wrap{ max-width:640px; margin:0 auto; padding:calc(34px + env(safe-area-inset-top)) 18px 60px; }
  header.hub{ text-align:center; margin-bottom:26px; }
  .hub .mark{ font-size:44px; line-height:1; }
  .hub h1{ margin:12px 0 6px; font-size:30px; font-weight:900; letter-spacing:-.5px;
    background:linear-gradient(90deg,var(--primary),var(--accent)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .hub p{ margin:0; color:var(--muted); font-size:15px; }
  .trips{ display:grid; gap:14px; }
  a.trip{
    display:block; text-decoration:none; color:inherit; position:relative; overflow:hidden;
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:18px 18px 18px 22px; box-shadow:0 6px 20px rgba(0,0,0,.06);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  a.trip:hover{ transform:translateY(-2px); box-shadow:0 10px 26px rgba(0,0,0,.12); }
  a.trip::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:6px; background:var(--tp,#f28c1a); }
  .trip .em{ font-size:30px; }
  .trip .tt{ font-size:19px; font-weight:800; margin:8px 0 2px; }
  .trip .st{ color:var(--muted); font-size:14px; }
  .trip .dt{ display:inline-block; margin-top:10px; font-size:12px; font-weight:800; letter-spacing:.04em;
    color:#fff; background:var(--tp,#f28c1a); border-radius:999px; padding:3px 10px; }
  .trip .go{ position:absolute; right:16px; bottom:16px; font-size:22px; color:var(--tp,#f28c1a); font-weight:900; }
  .loading{ text-align:center; color:var(--muted); padding:30px; }
  footer{ text-align:center; color:var(--muted); font-size:12px; margin-top:34px; }
  footer code{ background:var(--card); border:1px solid var(--line); border-radius:6px; padding:1px 5px; }
</style>
</head>
<body>
  <div class="wrap">
    <header class="hub">
      <div class="mark">🧭</div>
      <h1 id="hubTitle">Are We There Yet?</h1>
      <p id="hubTag">A pocket app for a day or a whole trip. Pick one.</p>
    </header>
    <div class="trips" id="trips"><div class="loading">Loading trips…</div></div>
    <footer>
      Each trip is its own offline app. Add to your home screen.<br>
      Set up the family and home once in <code>config.json</code>. New trip? See <code>SETUP.md</code>.
    </footer>
  </div>

<script>
  function esc(s){ return String(s).replace(/[&<>"]/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]; }); }
  function card(t){
    var tp = esc(t.primary || "#f28c1a");
    return '<a class="trip" href="./'+esc(t.slug)+'/" style="--tp:'+tp+'">'+
      '<span class="em">'+esc(t.emoji||"📍")+'</span>'+
      '<div class="tt">'+esc(t.title||t.slug)+'</div>'+
      (t.subtitle?'<div class="st">'+esc(t.subtitle)+'</div>':'')+
      (t.dates?'<span class="dt">'+esc(t.dates)+'</span>':'')+
      '<span class="go" aria-hidden="true">›</span></a>';
  }
  fetch("config.json", {cache:"no-cache"}).then(function(r){ return r.json(); }).then(function(d){
    var site = d.site || {};
    if(site.title) document.getElementById("hubTitle").textContent = site.title;
    if(site.tagline) document.getElementById("hubTag").textContent = site.tagline;
    document.title = site.title || "Are We There Yet?";
    var list = (d.trips||[]);
    document.getElementById("trips").innerHTML = list.length
      ? list.map(card).join("")
      : '<div class="loading">No trips yet. Add one to config.json.</div>';
  }).catch(function(){
    document.getElementById("trips").innerHTML = '<div class="loading">Could not load config.json.</div>';
  });
  if("serviceWorker" in navigator){
    window.addEventListener("load", function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); });
  }
</script>
</body>
</html>
